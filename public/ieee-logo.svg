<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6af7" />
      <stop offset="50%" stop-color="#a99ff8" />
      <stop offset="100%" stop-color="#4f46c4" />
    </linearGradient>
  </defs>
  <!-- Globe Symbol -->
  <g transform="translate(10, 10)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" opacity="0.3"/>
    <circle cx="30" cy="30" r="28" fill="none" stroke="url(#logo-grad)" stroke-width="2" stroke-dasharray="8,6"/>
    <!-- Orbiting paths -->
    <ellipse cx="30" cy="30" rx="28" ry="8" fill="none" stroke="url(#logo-grad)" stroke-width="2" transform="rotate(-30, 30, 30)" />
    <ellipse cx="30" cy="30" rx="28" ry="8" fill="none" stroke="url(#logo-grad)" stroke-width="2" transform="rotate(45, 30, 30)" />
    <circle cx="30" cy="30" r="6" fill="url(#logo-grad)" />
  </g>
  <!-- Text -->
  <text x="85" y="44" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="28" fill="#ffffff" letter-spacing="1">IEEE</text>
  <text x="85" y="62" font-family="'Inter', sans-serif" font-weight="600" font-size="12" fill="#9896b0" letter-spacing="3">RVCE BRANCH</text>
</svg>
